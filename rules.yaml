settings:
  default_status: running
  default_last_n_lines: 20

rules:
  # --- 内容规则：等待人类（Claude Code 特征） ---
  - name: claude-code-permission
    status: waiting
    type: content
    priority: 100
    last_n_lines: 5
    patterns:
      - "Allow this action\\?"
      - "Do you want to proceed\\?"
      - "approve|deny"

  - name: claude-code-plan-mode
    status: waiting
    type: content
    priority: 100
    last_n_lines: 5
    patterns:
      - "\\(yes/no\\)"
      - "Yes.*No.*Always"

  - name: claude-code-ask-user
    status: waiting
    type: content
    priority: 95
    last_n_lines: 8
    patterns:
      - "AskUserQuestion"
      - "waiting for your"

  - name: claude-code-interactive-ui
    status: waiting
    type: content
    priority: 98
    last_n_lines: 5
    patterns:
      - "Enter.*select.*Esc.*cancel"
      - "Enter.?to.?select"
      - "Esc.?to.?cancel"
      - "Arrow.?keys.?to.?navigate"

  # --- 内容规则：Claude Code 团队模式（teammates 仍在工作） ---
  # last_n_lines 设为 15：Claude Code 团队模式下底部状态栏较长
  # （team 成员列表、统计信息、bypass 模式等占 5-8 行），
  # "teammates running" 文字会被推到倒数 8-12 行的位置
  - name: claude-code-team-running
    status: running
    type: content
    priority: 96
    last_n_lines: 15
    patterns:
      - "Idle\\s*[·•]\\s*teammates\\s+running"
      - "teammates running"

  # --- 内容规则：等待人类（通用） ---
  - name: generic-waiting
    status: waiting
    type: content
    priority: 80
    last_n_lines: 5
    patterns:
      - "等待输入"
      - "请输入"
      - "waiting for input"
      - "press any key"

  # --- 内容规则：错误（仅高置信度模式） ---
  - name: error-traceback
    status: error
    type: content
    priority: 70
    last_n_lines: 15
    patterns:
      - "Traceback \\(most recent call last\\)"
      - "\\bfatal\\b"
      - "\\bpanic\\b"
      - "CRITICAL"
      - "Segmentation fault"

  # --- 内容规则：完成 ---
  - name: done-keywords
    status: done
    type: content
    priority: 60
    last_n_lines: 5
    patterns:
      - "任务完成"
      - "已完成"
      - "\\bcompleted successfully\\b"

  # --- 超时规则：停滞且末尾有等待特征 -> waiting ---
  - name: timeout-with-prompt
    status: waiting
    type: timeout
    priority: 50
    seconds: 5
    last_n_lines: 3
    require_patterns:
      - "\\$\\s*$"
      - "❯\\s*$"
      - ">\\s*$"

  # --- 超时规则：长时间停滞 -> done ---
  - name: timeout-idle
    status: done
    type: timeout
    priority: 55
    seconds: 5
    exclude_patterns:
      - "Allow"
      - "waiting"
      - "approve"
      - "\\(yes/no\\)"
      - "Enter.*select"
      - "Esc.*cancel"
      - "teammates running"
