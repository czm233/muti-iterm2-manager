<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iTerm 监控墙</title>
    <link rel="icon" type="image/png" href="/assets/favicon-32x32.png" />
    <link rel="stylesheet" href="/assets/vendor/xterm/xterm.min.css" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="dashboard-layout">
        <header class="hero topbar">
          <div class="topbar-row topbar-row--primary">
            <div class="topbar-menu topbar-menu--wide topbar-menu--brand">
              <div class="topbar-brand">
                <h1 class="eyebrow">
                  <button
                    type="button"
                    class="topbar-menu-trigger topbar-menu-trigger--brand"
                    aria-expanded="false"
                    aria-controls="topbar-menu-panel"
                    aria-label="打开顶部菜单"
                  >Monitor Wall</button>
                </h1>
              </div>
              <div class="topbar-menu-shell">
                <div id="topbar-menu-panel" class="topbar-menu-panel" role="region" aria-label="顶部菜单" aria-hidden="true">
                  <section class="topbar-menu-section topbar-menu-section--create">
                    <div class="panel-title">创建新任务</div>
                    <form id="create-form" class="create-form topbar-form">
                      <input id="name" name="name" type="text" placeholder="任务名称，例如：Claude 任务 A（可留空）" />
                      <div class="topbar-menu-actions">
                        <button type="submit" class="primary">启动并纳入监控</button>
                        <button type="button" id="create-demo" class="secondary">创建示例任务</button>
                      </div>
                    </form>
                  </section>

                  <section class="topbar-menu-section topbar-menu-section--adopt">
                    <div class="panel-title-row">
                      <div class="panel-title">接管已有终端</div>
                      <button id="adopt-all-sessions" class="secondary" style="font-size:0.8rem;padding:2px 8px;">一键接管</button>
                    </div>
                    <div id="adopt-session-list" class="adopt-session-list">
                      <button id="scan-sessions" class="secondary">扫描可用终端</button>
                    </div>
                  </section>

                  <section class="topbar-menu-section topbar-menu-section--actions">
                    <div class="panel-title">操作</div>
                    <div class="topbar-menu-actions">
                      <button id="app-monitor-btn" class="secondary">App监控</button>
                      <button id="monitor-mode" class="secondary">收起所有</button>
                      <button id="refresh-all" class="secondary">刷新全部</button>
                      <button id="close-all" class="danger">关闭全部</button>
                    </div>
                  </section>

                  <section class="topbar-menu-section topbar-menu-section--tuning">
                    <div class="panel-title">界面调优</div>
                    <form id="ui-settings-form" class="topbar-form ui-settings-form">
                      <div class="ui-settings-group">
                        <div class="ui-settings-group-title">实况界面调优</div>
                        <div class="ui-settings-group-grid">
                          <label>
                            <span>页面边距</span>
                            <input name="dashboard_padding_px" type="number" min="0" max="48" step="1" />
                          </label>
                          <label>
                            <span>监控区边距</span>
                            <input name="monitor_stage_padding_px" type="number" min="0" max="64" step="1" />
                          </label>
                          <label>
                            <span>区域间距</span>
                            <input name="dashboard_gap_px" type="number" min="0" max="48" step="1" />
                          </label>
                          <label>
                            <span>终端间距</span>
                            <input name="monitor_grid_gap_px" type="number" min="0" max="48" step="1" />
                          </label>
                          <label>
                            <span>终端外边框</span>
                            <input name="wall_card_border_width_px" type="number" min="0" max="8" step="0.5" />
                          </label>
                          <label>
                            <span>终端内边距</span>
                            <input name="wall_card_padding_px" type="number" min="0" max="48" step="1" />
                          </label>
                          <label>
                            <span>分割透明边宽</span>
                            <input name="split_resizer_hit_area_px" type="number" min="4" max="48" step="1" />
                          </label>
                          <label>
                            <span>分割线宽</span>
                            <input name="split_resizer_line_width_px" type="number" min="0" max="8" step="1" />
                          </label>
                          <label>
                            <span>网格拖拽边宽</span>
                            <input name="grid_resizer_hit_area_px" type="number" min="4" max="48" step="1" />
                          </label>
                          <label>
                            <span>网格线宽</span>
                            <input name="grid_resizer_line_width_px" type="number" min="0" max="8" step="1" />
                          </label>
                          <label>
                            <span>筛选滑动速度</span>
                            <input name="filter_tab_slide_duration_ms" type="number" min="50" max="5000" step="10" />
                          </label>
                          <label>
                            <span>终端字体大小</span>
                            <input name="terminal_font_size_px" type="number" min="6" max="24" step="1" />
                          </label>
                          <label>
                            <span>状态栏字体大小</span>
                            <input name="statusbar_font_size_px" type="number" min="10" max="18" step="1" />
                          </label>
                          <label>
                            <span>状态条宽度</span>
                            <input name="statusbar_meter_width_px" type="number" min="48" max="160" step="1" />
                          </label>
                          <label>
                            <span>状态条高度</span>
                            <input name="statusbar_meter_height_px" type="number" min="6" max="14" step="1" />
                          </label>
                        </div>
                      </div>
                      <div class="ui-settings-group">
                        <div class="ui-settings-group-title">摘要界面调优</div>
                        <div class="ui-settings-group-grid">
                          <label>
                            <span>摘要格子间距</span>
                            <input name="summary_grid_gap_px" type="number" min="0" max="48" step="1" />
                          </label>
                          <label>
                            <span>蜂巢边长</span>
                            <input name="summary_hex_side_px" type="number" min="42" max="180" step="1" />
                          </label>
                          <label>
                            <span>摘要卡片内边距</span>
                            <input name="summary_card_padding_px" type="number" min="0" max="48" step="1" />
                          </label>
                          <label>
                            <span>摘要卡片圆角</span>
                            <input name="summary_card_border_radius_px" type="number" min="0" max="48" step="1" />
                          </label>
                          <label>
                            <span>缝隙光效颜色</span>
                            <input name="summary_gap_glow_color" type="color" />
                          </label>
                          <label>
                            <span>缝隙光效范围</span>
                            <input name="summary_gap_glow_radius_px" type="number" min="80" max="640" step="5" />
                          </label>
                          <label>
                            <span>缝隙光效强度</span>
                            <input name="summary_gap_glow_strength" type="number" min="0" max="1.5" step="0.05" />
                          </label>
                          <label>
                            <span>缝隙光效柔化</span>
                            <input name="summary_gap_glow_softness_px" type="number" min="0" max="40" step="1" />
                          </label>
                          <label>
                            <span>缝隙光效线宽</span>
                            <input name="summary_gap_glow_line_width_px" type="number" min="0" max="24" step="1" />
                          </label>
                        </div>
                      </div>
                      <div class="topbar-menu-actions" style="align-items:center;">
                        <button type="button" id="ui-settings-reset" class="ghost">恢复默认</button>
                        <div id="ui-settings-path" class="wall-page-text" style="margin:0;"></div>
                      </div>
                    </form>
                    <div id="topbar-menu-tuning-extra" class="topbar-menu-tuning-extra"></div>
                  </section>

                  <section class="topbar-menu-section topbar-menu-section--summary">
                    <div class="panel-title">摘要视图</div>
                    <form id="summary-config-form" class="topbar-form">
                      <label>
                        <span>API 地址</span>
                        <input name="api_base" type="text" placeholder="https://open.bigmodel.cn/api/paas/v4" />
                      </label>
                      <label>
                        <span>API Key</span>
                        <input name="api_key" type="password" placeholder="输入 API Key" />
                      </label>
                      <label>
                        <span>摘要模型</span>
                        <input name="model" type="text" placeholder="glm-4.6" />
                      </label>
                      <label>
                        <span>刷新间隔（秒）</span>
                        <input name="interval_seconds" type="number" min="10" max="300" step="5" />
                      </label>
                      <label>
                        <span>活跃刷新间隔（秒）</span>
                        <input name="active_interval" type="number" min="5" max="300" step="5" value="10" />
                      </label>
                      <label>
                        <span>Fallback重试间隔（秒）</span>
                        <input name="fallback_retry_interval" type="number" min="5" max="300" step="5" value="30" />
                      </label>
                      <div class="topbar-menu-actions">
                        <button type="submit" class="primary">保存配置</button>
                      </div>
                    </form>
                  </section>
                </div>
              </div>
            </div>

            <span class="topbar-divider"></span>
            <div class="topbar-shortcuts">
              <button id="quick-create" class="shortcut-btn shortcut-btn--new" title="创建新终端">新建</button>
              <div class="topbar-view-switch">
                <button class="view-btn is-active" data-view="live" title="实况视图（Tab 快速切换）">实况</button>
                <button class="view-btn" data-view="brief" title="摘要视图（Tab 快速切换）">摘要</button>
              </div>
            </div>

            <div id="topbar-primary-focus" class="topbar-primary-focus" aria-label="最重要任务"></div>
            <div id="topbar-queue" class="topbar-queue" aria-label="空闲队列"></div>
            <nav id="topbar-filters" class="topbar-filters">
              <button class="filter-tab is-active" data-filter="default">默认</button>
              <button class="filter-tab filter-tab--attention" data-filter="attention">待处理<span id="filter-attention-badge" class="filter-badge" hidden></span></button>
              <button class="filter-tab filter-tab--running" data-filter="running">工作中<span id="filter-running-badge" class="filter-badge" hidden></span></button>
              <button class="filter-tab filter-tab--done" data-filter="done">空闲<span id="filter-done-badge" class="filter-badge" hidden></span></button>
              <button class="filter-tab" data-filter="all">全部</button>
              <button class="filter-tab filter-tab--hidden" data-filter="hidden">已隐藏<span id="filter-hidden-badge" class="filter-badge" hidden></span></button>
            </nav>
            <nav id="tag-filter-tabs" class="tag-filter-tabs"></nav>
          </div>
        </header>

        <section class="monitor-stage">
          <main id="grid" class="monitor-wall"></main>
          <div id="app-monitor-wall" class="app-monitor-wall"></div>
        </section>
      </div>

      <footer class="statusbar" aria-label="系统状态栏">
        <div class="statusbar-inner">
          <span id="stat-cpu" class="status-pill stat-pill status-meter" title="CPU 使用率">
            <span class="status-meter-label">CPU --%</span>
            <span class="status-meter-track"><span class="status-meter-fill"></span></span>
          </span>
          <span id="stat-mem" class="status-pill stat-pill status-meter" title="内存使用率">
            <span class="status-meter-label">MEM --%</span>
            <span class="status-meter-track"><span class="status-meter-fill"></span></span>
          </span>
          <span id="stat-disk" class="status-pill stat-pill status-meter" title="磁盘使用率">
            <span class="status-meter-label">DISK --%</span>
            <span class="status-meter-track"><span class="status-meter-fill"></span></span>
          </span>
          <span id="stat-disk-free" class="status-pill stat-pill status-meter" title="磁盘剩余空间">
            <span class="status-meter-label">FREE --G</span>
            <span class="status-meter-track"><span class="status-meter-fill"></span></span>
          </span>
          <span id="message" class="topbar-message statusbar-message"></span>
          <span class="statusbar-right-group"><span id="ws-status" class="status-pill status-connecting">连接中</span><span id="build-version" class="status-pill">{{BUILD_VERSION}}</span></span>
        </div>
      </footer>
    </div>

    <link rel="stylesheet" href="/assets/app-monitor.css" />

    <dialog id="app-monitor-dialog" class="app-monitor-dialog">
      <div class="app-monitor-dialog-header">
        <h2>选择要监控的窗口</h2>
        <button type="button" class="ghost" id="app-monitor-dialog-close">&times;</button>
      </div>
      <div class="app-monitor-dialog-body">
        <div id="app-monitor-window-list" class="app-monitor-window-list"></div>
        <div class="app-monitor-dialog-footer">
          <label class="app-monitor-interval-label">
            截图间隔：<input id="app-screenshot-interval" type="number" min="0.5" max="30" step="0.5" value="2" /> 秒
          </label>
        </div>
      </div>
    </dialog>

    <dialog id="connection-dialog" class="idea-dialog connection-dialog" aria-labelledby="connection-dialog-title" aria-describedby="connection-dialog-description">
      <div class="idea-dialog-shell connection-dialog-shell">
        <header class="idea-dialog-header connection-dialog-header">
          <div>
            <div class="idea-dialog-kicker">Connection</div>
            <h2 id="connection-dialog-title">正在连接 multi-iterm2-manager</h2>
          </div>
          <span id="connection-dialog-state" class="connection-dialog-state">连接中</span>
        </header>
        <div class="connection-dialog-content">
          <div class="connection-dialog-orb" aria-hidden="true">
            <span></span>
          </div>
          <div class="connection-dialog-copy">
            <p id="connection-dialog-description" class="connection-dialog-description">服务连接暂时中断，正在自动重连。</p>
            <p id="connection-dialog-detail" class="connection-dialog-detail">当前监控画面会保留，连接恢复后会自动同步最新状态。</p>
            <div class="connection-dialog-meta" aria-live="polite">
              <span id="connection-dialog-attempt">准备连接</span>
              <span id="connection-dialog-retry">请稍候</span>
            </div>
          </div>
        </div>
      </div>
    </dialog>

    <dialog id="idea-dialog" class="idea-dialog" aria-labelledby="idea-dialog-title">
      <div class="idea-dialog-shell">
        <header class="idea-dialog-header">
          <div>
            <div class="idea-dialog-kicker">Ideas</div>
            <h2 id="idea-dialog-title">项目想法</h2>
          </div>
          <button type="button" class="idea-dialog-close" id="idea-dialog-close" aria-label="关闭想法窗口">&times;</button>
        </header>
        <div id="idea-dialog-content" class="idea-dialog-content"></div>
      </div>
    </dialog>

    <div id="terminal-context-menu" class="terminal-context-menu" role="menu" aria-hidden="true" hidden></div>
    <script src="/assets/vendor/xterm/xterm.min.js"></script>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
